name: CI / CD

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

# 같은 브랜치에 새 push가 오면 이전 실행 자동 취소
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}

      - name: pnpm 설치
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Node.js 22 LTS 설정
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      # Gatsby 캐시 복원 (빌드 시간 대폭 단축)
      - name: Gatsby 캐시 복원
        uses: actions/cache@v4
        with:
          path: |
            packages/blog/.cache
            packages/blog/public
          key: gatsby-build-${{ hashFiles('packages/blog/package.json') }}-${{ hashFiles('packages/blog/gatsby-config.js') }}
          restore-keys: |
            gatsby-build-${{ hashFiles('packages/blog/package.json') }}-
            gatsby-build-

      - name: 코어 (디자인시스템) 빌드
        run: pnpm build:core

      - name: 블로그 빌드
        run: pnpm build:blog

      - name: GitHub Pages 배포
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --global user.email "ysb05222@naver.com"
          git config --global user.name "SungbinYang"
          pnpm deploy:blog-ex ${{ secrets.TOKEN }}
